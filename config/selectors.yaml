# CMS Selectors Configuration
# Extracted from actual CMS HTML dumps

login:
  # Role selection
  role_dropdown_trigger: "button[role='combobox']"
  role_options: "[role='option']"
  role_text_selector: "span.font-medium"
  
  # Credentials
  email_input: "input#email"
  password_input: "input#password"
  
  # Submit
  submit_button: "button[type='submit']"

dashboard:
  # Sidebar navigation (after login)
  content_menu: "text='Content'"
  articles_submenu: "text='Articles'"
  create_article_btn: "text='Create Article'"

article_form:
  modal: "[role='dialog']"

  english_title: "input[placeholder*='English title' i], #title_en"
  english_body: "textarea[placeholder*='English content' i], #content_en"

  category_trigger: "button:has-text('Select category')"
  category_option: "[role='option']"

  keywords_input: "input[placeholder*='keyword' i]"
  media_type_trigger: "xpath=//label[contains(normalize-space(), 'Media Type')]/following::*[@role='combobox'][1]"
  file_input: "input[type='file']"

  submit_button: "button:has-text('Submit for Review')"

verification:
  success_toast: ".toast-success, text='successfully', text='review', text='created'"
